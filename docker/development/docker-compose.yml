version: '3.9'
services:
  backend:
    restart: unless-stopped
    build:
      context: ./../../apps/backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./../../.env.development
    volumes:
      - ./../../apps/backend:/app
    depends_on:
      - db
      - redis

  frontend:
    restart: unless-stopped
    build:
      context: ./../../apps/frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ./../../.env.development
    volumes:
      - ./../../apps/frontend:/app

  db:
    restart: unless-stopped
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: palmcore
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    restart: unless-stopped
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  db_data:
